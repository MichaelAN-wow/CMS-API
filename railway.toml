# Railway deployment config (config-as-code)
# https://docs.railway.app/deploy/config-as-code

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Railway sets PORT automatically; no need to override start command
# if your Dockerfile CMD uses PORT from the environment (it does).
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
# Health check: must return 200. App may be slow to start (InsightFace loads models).
healthcheckPath = "/health"
healthcheckTimeout = 600
